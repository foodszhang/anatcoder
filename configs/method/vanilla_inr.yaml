name: vanilla_inr

encoding:
  type: hash_grid
  n_levels: 16
  n_features_per_level: 2
  log2_hashmap_size: 19
  base_resolution: 16
  per_level_scale: 1.447

backbone:
  n_layers: 4
  hidden_dim: 256
  skip_connections: [2]

optimizer:
  lr: 5e-4
  weight_decay: 0

scheduler:
  type: cosine
  T_max: 50000

max_steps: 50000
